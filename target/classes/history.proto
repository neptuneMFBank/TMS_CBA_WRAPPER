syntax = "proto3";

package com.neptune.cba;

option java_multiple_files = true;
option java_package = "com.neptune.cba.transaction.history";

service HistoryService {
  rpc history(HistoryRequest) returns (HistoryResponse) {
  }
  rpc transactionStatus(TransactionStatusRequest) returns (TransactionStatusResponse){}
  rpc transDetails(transDetailsRequest) returns (transDetailsResponse){
  }

}

message transDetailsResponse {
  // Existing fields
  string second_leg = 1;
  string employee_id = 2;
  string approval_id = 3; // added June 23

  // Transaction details
  string bank_name = 4;
  double amount = 5;
  string type = 6;               // CREDIT / DEBIT
  string paid_on = 7;            // formatted date string
  string narration = 8;
  string from_name = 9;
  string to_name = 10;
  string to_bank = 11;
  string to_account = 12;
  string status = 13;            // successful / failed / pending
  string reference = 14;
}

message transDetailsRequest {
  string transdate = 1;
  string valuedate = 2;
  double amount = 3;
  string narration = 4;
  string account  = 5;
  string ref =6; // new june 17
  bool details =7;
}

message  TransactionStatusResponse{
  string message = 1;
  string code = 2;
  string additionalInfo =3;
}

message TransactionStatusRequest {
  string  ref =1;
  TransactionCategory transactionType = 2;
}

enum TransactionCategory {
  BILL_PAYMENT = 0;
  INTRA = 1;
  EASY_PAY = 2;
  DEBIT_CREDIT = 3;
}

message callOverRequest {
  string eid = 1;
  string fromdate =2;
  string todate =3;
}


message EmployeeHistoryRequest{
  string eid =1 ;
  string date =2;
  int32 page =3;
  int32 pageSize = 4;
}
message HistoryRequest {
  string acctNo = 1;
  string narration =4;
  string fromdate =2;
  string todate =3;
  int32 page =5;
  int32 pageSize = 6;
}
message SpentTodayRequest {
  string acctNo = 1;
}

message SpentTodayResponse {
  double totaldebit = 1;
  double totalcredit = 2;
  int32 responseCode = 3;
  string responseMessage = 4;

}

message reverseTransactionRequest {
  string fromdate =1;
  string todate =2;
  int32 page =3;
  int32 pageSize = 4;
}

message HistoryResponse {
  repeated Transaction_history history = 1;
  int64 totalItems = 2;
  int64 totalPages = 3;
  int64 currentPages = 4;
}

message Transaction_history {
  string accountnumber =1;
  string bankname =2;
  double bkbalance =3;
  int32  idno =4;
  string narration = 6;
  string refno =7;
  int32  rn =8;
  double tranamount =9;
  string trandate =10;
  string valuedate =11;
  string transactionType = 12;
  string status = 13;
  string session_id = 14;
  string accountname = 15;
  string pin = 16;
}

message callOverResponse {
  repeated EmployeeHistory employee_history =1;
}
message EmployeeHistory {
  string name =1;
  repeated Transaction_history history = 2;
}